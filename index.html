const {

// ================================================================
//  SMART CSV/TSV PARSER
// ================================================================
function parseSpreadsheetData(text) {
  if (!text || !text.trim()) return [];
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const firstLine = lines[0];
  const tabCount = (firstLine.match(/\t/g) || []).length;
  const commaCount = (firstLine.match(/,/g) || []).length;
  const delimiter = tabCount >= commaCount ? "\t" : ",";
  function splitLine(line) {
    const fields = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && i + 1 < line.length && line[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === delimiter && !inQuotes) {
        fields.push(current.trim());
        current = "";
      } else {
        current += ch;
      }
    }
    fields.push(current.trim());
    return fields;
  }
  const header = splitLine(lines[0]).map(h => h.replace(/"/g, "").trim().toLowerCase());
  const colMap = {};
  const patterns = {
    date: /date|settlement/i,
    direction: /direction|side|action|type/i,
    ticker: /ticker|symbol|code|stock/i,
    company: /company|name|security/i,
    units: /units|quantity|shares|volume/i,
    price: /price.*unit|unit.*price|price/i,
    gross: /gross/i,
    settlement: /total.*settlement|settlement.*amount/i,
    brokerage: /brokerage|commission|fee/i,
    account: /account/i
  };
  for (const [field, regex] of Object.entries(patterns)) {
    const idx = header.findIndex(h => regex.test(h));
    if (idx !== -1) colMap[field] = idx;
  }
  const usePositional = Object.keys(colMap).length < 5;
  const trades = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const fields = splitLine(lines[i]);
    if (fields.length < 6) continue;
    let date, direction, ticker, company, units, price, gross, settlement, brokerage, account;
    if (usePositional) {
      date = fields[0] || "";
      direction = (fields[1] || "").toUpperCase();
      ticker = (fields[2] || "").toUpperCase();
      company = fields[3] || "";
      units = parseFloat((fields[4] || "0").replace(/[$,]/g, "")) || 0;
      price = parseFloat((fields[5] || "0").replace(/[$,]/g, "")) || 0;
      gross = parseFloat((fields[6] || "0").replace(/[$,]/g, "")) || 0;
      settlement = parseFloat((fields[7] || "0").replace(/[$,]/g, "")) || null;
      brokerage = parseFloat((fields[8] || "0").replace(/[$,]/g, "")) || 0;
      account = fields[9] || "";
    } else {
      const get = field => colMap[field] != null && fields[colMap[field]] ? fields[colMap[field]] : "";
      date = get("date");
      direction = get("direction").toUpperCase();
      ticker = get("ticker").toUpperCase();
      company = get("company");
      units = parseFloat(get("units").replace(/[$,]/g, "")) || 0;
      price = parseFloat(get("price").replace(/[$,]/g, "")) || 0;
      gross = parseFloat(get("gross").replace(/[$,]/g, "")) || 0;
      settlement = parseFloat(get("settlement").replace(/[$,]/g, "")) || null;
      brokerage = parseFloat(get("brokerage").replace(/[$,]/g, "")) || 0;
      account = get("account");
    }
    if (!direction || !ticker || units <= 0 || price <= 0) continue;
    if (direction !== "BOUGHT" && direction !== "SOLD") continue;
    if (!gross || gross === 0) gross = units * price;
    trades.push({
      date,
      direction,
      ticker,
      company,
      units,
      price,
      gross,
      settlement,
      brokerage,
      account
    });
  }
  return trades;
}

// ================================================================
//  FIFO ENGINE
// ================================================================
function runFIFO(trades) {
  if (!trades || trades.length === 0) return {
    openPositions: [],
    closedTrades: [],
    tickerStats: {},
    monthlyPnL: [],
    monthlyActivity: []
  };
  const sorted = [...trades].sort((a, b) => {
    const da = new Date(a.date),
      db = new Date(b.date);
    if (isNaN(da.getTime()) && isNaN(db.getTime())) return 0;
    if (isNaN(da.getTime())) return 1;
    if (isNaN(db.getTime())) return -1;
    return da - db;
  });
  const holdings = {};
  const closed = [];
  for (const t of sorted) {
    const tk = t.ticker;
    if (!holdings[tk]) holdings[tk] = {
      company: t.company,
      lots: []
    };
    if (t.direction === "BOUGHT") {
      holdings[tk].lots.push({
        date: t.date,
        units: t.units,
        price: t.price,
        brokerage: t.brokerage,
        remaining: t.units
      });
    } else if (t.direction === "SOLD") {
      let remaining = t.units;
      const brokeragePerUnit = t.units > 0 ? t.brokerage / t.units : 0;
      while (remaining > 0 && holdings[tk].lots.length > 0) {
        const lot = holdings[tk].lots[0];
        const filled = Math.min(remaining, lot.remaining);
        const buyBrokPerUnit = lot.units > 0 ? lot.brokerage / lot.units : 0;
        const totalBrokerage = (buyBrokPerUnit + brokeragePerUnit) * filled;
        const pnl = (t.price - lot.price) * filled - totalBrokerage;
        const buyDate = new Date(lot.date);
        const sellDate = new Date(t.date);
        const holdingDays = !isNaN(buyDate) && !isNaN(sellDate) ? Math.max(0, Math.round((sellDate - buyDate) / 86400000)) : 0;
        closed.push({
          ticker: tk,
          company: holdings[tk].company,
          buyDate: lot.date,
          sellDate: t.date,
          units: filled,
          buyPrice: lot.price,
          sellPrice: t.price,
          grossPnL: (t.price - lot.price) * filled,
          brokerage: Math.round(totalBrokerage * 100) / 100,
          netPnL: Math.round(pnl * 100) / 100,
          holdingDays,
          returnPct: lot.price > 0 ? Math.round((t.price - lot.price) / lot.price * 10000) / 100 : 0
        });
        lot.remaining -= filled;
        remaining -= filled;
        if (lot.remaining <= 0) holdings[tk].lots.shift();
      }
    }
  }
  const openPositions = [];
  for (const [ticker, h] of Object.entries(holdings)) {
    const totalUnits = h.lots.reduce((s, l) => s + l.remaining, 0);
    if (totalUnits <= 0) continue;
    const totalCost = h.lots.reduce((s, l) => s + l.remaining * l.price, 0);
    const totalBrok = h.lots.reduce((s, l) => s + (l.units > 0 ? l.remaining / l.units * l.brokerage : 0), 0);
    openPositions.push({
      ticker,
      company: h.company,
      units: totalUnits,
      avgCost: Math.round(totalCost / totalUnits * 10000) / 10000,
      totalCost: Math.round(totalCost * 100) / 100,
      brokerage: Math.round(totalBrok * 100) / 100,
      lotCount: h.lots.length,
      firstBuy: h.lots[0]?.date || ""
    });
  }
  openPositions.sort((a, b) => b.totalCost - a.totalCost);
  const tickerStats = {};
  for (const c of closed) {
    if (!tickerStats[c.ticker]) {
      tickerStats[c.ticker] = {
        ticker: c.ticker,
        company: c.company,
        trades: 0,
        wins: 0,
        losses: 0,
        totalPnL: 0,
        totalBrokerage: 0,
        totalHoldingDays: 0,
        totalUnits: 0
      };
    }
    const ts = tickerStats[c.ticker];
    ts.trades++;
    ts.totalPnL += c.netPnL;
    ts.totalBrokerage += c.brokerage;
    ts.totalHoldingDays += c.holdingDays;
    ts.totalUnits += c.units;
    if (c.netPnL > 0) ts.wins++;else ts.losses++;
  }
  const monthlyMap = {};
  for (const c of closed) {
    const m = c.sellDate && c.sellDate.length >= 7 ? c.sellDate.substring(0, 7) : null;
    if (!m) continue;
    if (!monthlyMap[m]) monthlyMap[m] = {
      month: m,
      realizedPnL: 0,
      brokerage: 0,
      trades: 0,
      wins: 0
    };
    monthlyMap[m].realizedPnL += c.netPnL;
    monthlyMap[m].brokerage += c.brokerage;
    monthlyMap[m].trades++;
    if (c.netPnL > 0) monthlyMap[m].wins++;
  }
  const monthlyPnL = Object.values(monthlyMap).sort((a, b) => a.month.localeCompare(b.month));
  let cum = 0;
  for (const m of monthlyPnL) {
    m.realizedPnL = Math.round(m.realizedPnL * 100) / 100;
    m.brokerage = Math.round(m.brokerage * 100) / 100;
    cum += m.realizedPnL;
    m.cumulative = Math.round(cum * 100) / 100;
    m.winRate = m.trades > 0 ? Math.round(m.wins / m.trades * 100) : 0;
  }
  const activityMap = {};
  for (const t of sorted) {
    const m = t.date && t.date.length >= 7 ? t.date.substring(0, 7) : null;
    if (!m) continue;
    if (!activityMap[m]) activityMap[m] = {
      month: m,
      buys: 0,
      sells: 0,
      buyValue: 0,
      sellValue: 0,
      brokerage: 0,
      tickers: new Set()
    };
    activityMap[m].tickers.add(t.ticker);
    activityMap[m].brokerage += t.brokerage || 0;
    if (t.direction === "BOUGHT") {
      activityMap[m].buys++;
      activityMap[m].buyValue += t.settlement || t.gross;
    } else {
      activityMap[m].sells++;
      activityMap[m].sellValue += t.settlement || t.gross;
    }
  }
  const monthlyActivity = Object.values(activityMap).sort((a, b) => a.month.localeCompare(b.month)).map(m => ({
    ...m,
    totalTrades: m.buys + m.sells,
    uniqueTickers: m.tickers.size,
    tickers: Array.from(m.tickers).sort().join(", ")
  }));
  return {
    openPositions,
    closedTrades: closed,
    tickerStats,
    monthlyPnL,
    monthlyActivity
  };
}

const fmt = (v, dec = 2) => {
  if (v == null || isNaN(v)) return "\u2014";
  const sign = v < 0 ? "-" : "";
  return sign + "$" + Math.abs(v).toLocaleString("en-US", {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec

};
const fmtPct = v => v == null || isNaN(v) ? "\u2014" : (v >= 0 ? "+" : "") + v.toFixed(2) + "%";

const fmtMonth = v => {
  if (!v || v.length < 7) return v || "";
  const parts = v.split("-");
  return MONTH_NAMES[parseInt(parts[1]) - 1] + " " + parts[0].slice(2);
};

// ================================================================
//  MAIN DASHBOARD
// ================================================================
function TradeDashboard() {
  const [webAppUrl, setWebAppUrl] = useState("");
  const [rawTrades, setRawTrades] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [parseInfo, setParseInfo] = useState("");
  const [tab, setTab] = useState("overview");
  const [csvInput, setCsvInput] = useState("");
  const [inputMode, setInputMode] = useState("url");
  const [sortConfig, setSortConfig] = useState({
    key: null,
    dir: "desc"
  });
  const fetchFromUrl = useCallback(async () => {
    if (!webAppUrl.trim()) return;
    setLoading(true);
    setError("");
    setParseInfo("");
    try {
      const res = await fetch(webAppUrl.trim());
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const trades = data.trades || data;
      if (!Array.isArray(trades)) throw new Error("Unexpected response format");
      setRawTrades(trades);
      const buys = trades.filter(t => t.direction === "BOUGHT").length;
      const sells = trades.filter(t => t.direction === "SOLD").length;
      setParseInfo("Loaded " + trades.length + " trades (" + buys + " buys, " + sells + " sells)");
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [webAppUrl]);
  const loadPasted = useCallback(() => {
    if (!csvInput.trim()) return;
    setError("");
    setParseInfo("");
    try {
      const trades = parseSpreadsheetData(csvInput);
      if (trades.length === 0) throw new Error("No valid trade rows found. Include the header row.");
      const buys = trades.filter(t => t.direction === "BOUGHT").length;
      const sells = trades.filter(t => t.direction === "SOLD").length;
      setParseInfo("Parsed " + trades.length + " trades (" + buys + " buys, " + sells + " sells)");
      setRawTrades(trades);
    } catch (e) {
      setError("Parse error: " + e.message);
    }
  }, [csvInput]);
  const analysis = useMemo(() => runFIFO(rawTrades), [rawTrades]);
  const stats = useMemo(() => {
    if (rawTrades.length === 0) return null;
    const totalBrokerage = rawTrades.reduce((s, t) => s + (t.brokerage || 0), 0);
    const totalBuyValue = rawTrades.filter(t => t.direction === "BOUGHT").reduce((s, t) => s + t.gross, 0);
    const totalSellValue = rawTrades.filter(t => t.direction === "SOLD").reduce((s, t) => s + t.gross, 0);
    const totalRealizedPnL = analysis.closedTrades.reduce((s, c) => s + c.netPnL, 0);
    const wins = analysis.closedTrades.filter(c => c.netPnL > 0).length;
    const total = analysis.closedTrades.length;
    const avgHold = total > 0 ? analysis.closedTrades.reduce((s, c) => s + c.holdingDays, 0) / total : 0;
    const avgWin = wins > 0 ? analysis.closedTrades.filter(c => c.netPnL > 0).reduce((s, c) => s + c.netPnL, 0) / wins : 0;
    const losses = total - wins;
    const avgLoss = losses > 0 ? analysis.closedTrades.filter(c => c.netPnL <= 0).reduce((s, c) => s + c.netPnL, 0) / losses : 0;
    const expectancy = total > 0 ? wins / total * avgWin + losses / total * avgLoss : 0;
    const openCost = analysis.openPositions.reduce((s, p) => s + p.totalCost, 0);
    const brokerageOfGross = totalBuyValue + totalSellValue > 0 ? totalBrokerage / (totalBuyValue + totalSellValue) * 100 : 0;
    return {
      totalTrades: rawTrades.length,
      totalBrokerage,
      totalBuyValue,
      totalSellValue,
      totalRealizedPnL,
      winRate: total > 0 ? wins / total * 100 : 0,
      avgHold,
      avgWin,
      avgLoss,
      expectancy,
      openPositions: analysis.openPositions.length,
      openCost,
      brokerageOfGross,
      closedCount: total,
      buyCount: rawTrades.filter(t => t.direction === "BOUGHT").length,
      sellCount: rawTrades.filter(t => t.direction === "SOLD").length
